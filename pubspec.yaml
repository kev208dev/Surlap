name: spacehour
description: "HourSpace — 나만의 일정·시간표·위젯을 한 곳에"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 상태관리
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 저장소
  shared_preferences: ^2.3.2

  # Supabase
  supabase_flutter: ^2.8.4

  # 유틸
  intl: ^0.20.2
  uuid: ^4.5.1

  # 파일 백업/복원
  file_picker: ^8.3.7
  path_provider: ^2.1.5

  # 공유
  share_plus: ^10.1.4
  url_launcher: ^6.3.1

  # NEIS HTTP
  http: ^1.4.0

  # SVG 아이콘
  flutter_svg: ^2.0.17
  app_links: ^7.0.0

  # 음성 인식 (할 일 음성 입력)
  speech_to_text: ^7.0.0

  # 갤러리 저장 (달력 이미지 저장)
  gal: ^2.3.0

  # 로컬 알림 (생일 알림)
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  lottie: ^3.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.5
  build_runner: ^2.4.15
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/mascot/
    - assets/icon/
  # assets/fonts/ 에 파일이 없으면 빌드 오류 — 폰트는 web/index.html CDN 사용

# 네이티브 스플래시(앱 시작~Flutter 첫 프레임). 인트로 배경(#6B3DF9)과 동일색.
# 적용: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#6B3DF9"
  image: assets/mascot/splash_icon.png
  android_12:
    color: "#6B3DF9"
    image: assets/mascot/splash_icon.png
